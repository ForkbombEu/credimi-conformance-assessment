business_logic_recommendation:
  recommended_approach: template_plus_rules_engine
  why_not_full_unroll:
  - Full static unrolling of all credential_profile × format × algorithm × grant × trust-mode combinations would explode quickly
    and become hard to maintain.
  - The same pipeline pattern can cover many combinations if credential_metadata is recorded.
  - New formats/algorithms can be added by updating metadata dimensions and rules rather than duplicating pipeline templates.
  rule_engine_inputs:
  - executed_aggregate_template_id
  - step_statuses
  - credential_metadata
  - presentation_metadata
  - trust_resolution_result
  - verifier_result
  - external_test_result
  - artifact_presence
  rule_engine_outputs:
  - flat_test_results
  - evidence_claim_results
  - evidence_strength
  - limitations
  - required_followup_tests
  minimal_algorithm:
  - 1. Load aggregate template selected for the pipeline.
  - 2. Collect all step outputs and conformance_context objects from Temporal.
  - 3. Evaluate each emits_flat_tests.when expression.
  - 4. Emit matching flat test result with strength and artifact references.
  - 5. Emit mapped evidence_claim_results from the registry.
  - 6. Apply strengthening/degradation rules, e.g. positive issuance gives conditional crypto verification; negative invalid-signature
    rejection upgrades to definitive.
  - 7. Attach limitations when internal Wallet behaviour was inferred rather than directly observed.
normative_reference_model:
  strategy: template-level union plus conditional refs
  description: Each aggregated template contains a union of normative references derived from the evidence claims it can emit.
    Individual emitted flat tests may use a subset of these references depending on metadata/rules. This avoids full static
    unrolling.
  fields:
    reference_type: eu_legal_act | arf_requirement | webuild_working_document | etsi_standard | openid_profile | external_conformance
    id: Stable source ID, e.g. EU-2024-2982, EW-PIO-01-003, ETSI-TS-119-472-3-V1-1-1
    document_name: Human-readable document name
    url: Official source or PDF URL
    paragraph: Article, recital, annex, ARF index, ETSI deliverable/short reference, profile section, or working-document
      section
    notes: Why this reference matters for the template
