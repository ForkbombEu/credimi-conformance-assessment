- template_id: agg-wallet-issuer-negative-crypto-trust-suite
  title: Wallet issuance negative crypto/trust suite
  actor_scope:
  - wallet
  - issuer
  objective: Use controlled bad issuers/offers to prove Wallet rejection/warning behaviour for invalid signatures, expired/revoked
    certificates and untrusted issuers.
  recommended_execution:
    primary_mode: negative-fixture-plus-maestro
    credimi_support: credimi_upcoming
    outside_credimi_required: false
  pipeline_steps:
  - step_id: select-negative-issuer-fixture
    kind: fixture-selector
    outputs:
    - fixture_metadata
  - step_id: get-negative-offer
    kind: stepci
    outputs:
    - credential_offer
    - credential_metadata
  - step_id: wallet-attempt-issuance
    kind: maestro
    outputs:
    - maestro_flow_output
    - warning_or_failure_screenshot
  - step_id: assert-expected-failure
    kind: helper
    outputs:
    - negative_test_result
  input_requirements:
    required:
    - negative_fixture_type
    - credential_metadata
    - expected_wallet_failure_or_warning
  emits_flat_tests:
  - test_no: 20
    when: fixture_type == invalid_issuer_signature
    strength: definitive
  - test_no: 21
    when: fixture_type == expired_issuer_certificate
    strength: definitive
  - test_no: 22
    when: fixture_type == revoked_issuer_certificate
    strength: definitive
  - test_no: 23
    when: fixture_type == untrusted_issuer
    strength: definitive
  - test_no: 24
    when: positive trusted issuer control also run
    strength: definitive
  - test_no: 125
    when: verifier negative invalid-signature fixture also run
    strength: definitive
  - test_no: 129
    when: untrusted issuer verifier fixture also run
    strength: definitive
  emits_evidence_claims:
  - wallet-receives-pid-eaa-issuance-request
  - issuer-validity-status-and-revocation
  - verifier-validates-credential-signature-status-and-issuer-trust
  coverage_rules:
  - rule_id: negative-fixture-proves-rejection
    if: wallet warning/failure matches expected negative fixture
    then: Emit definitive rejection evidence for the tested negative condition.
  evidence_artifacts:
  - negative_fixture_metadata
  - credential_offer
  - credential_metadata
  - warning_or_failure_screenshot
  - negative_test_result
  notes: []
  normative_references:
  - reference_type: eu_legal_act
    id: EU-2024-2982
    document_name: Commission Implementing Regulation (EU) 2024/2982 — Protocols and interfaces
    url: https://eur-lex.europa.eu/eli/reg_impl/2024/2982/oj
    paragraph: Article 4
    notes: Issuance of PID and EAAs to wallet units.
  - reference_type: eu_legal_act
    id: EU-2024-2977
    document_name: Commission Implementing Regulation (EU) 2024/2977 — PID and electronic attestations of attributes
    url: https://eur-lex.europa.eu/eli/reg_impl/2024/2977/oj
    paragraph: Article 3
    notes: Issuance of person identification data to wallet units.
  - reference_type: eu_legal_act
