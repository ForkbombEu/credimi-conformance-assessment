version: '1.1'
name: Credimi Conformance Aggregation Taxonomy
purpose: Machine-readable taxonomy for mapping a small number of aggregated Credimi pipeline patterns to many flat conformance
  tests and evidence claims. Designed for Credimi execution logic, not for human certification claims.
design_principles:
- Do not unroll every possible credential/profile/algorithm combination as separate static tests unless necessary.
- Use aggregated test templates plus metadata-driven coverage rules.
- Treat Maestro success as definitive only for observable behaviour; treat internal crypto/storage claims as conditional unless
  strengthened by verifier-side, negative-fixture, headless or external tests.
- Keep the flat test list as the atomic evidence/test vocabulary.
- Keep the evidence registry as the legal/ARF/WE BUILD/ETSI reference vocabulary.
- Use conformance_context artifacts passed through Temporal as the bridge between protocol metadata and Wallet black-box behaviour.
source_inputs:
  flat_test_list: credimi-flat-conformance-test-list-v0.2-with-references.md
  evidence_registry: credimi-conformance-evidence-registry-v0.9.yaml
  schema: credimi-conformance-result.schema.v0.4.json
result_strength_vocabulary:
  definitive: The aggregated pipeline directly proves the observable claim.
  conditional: The aggregated pipeline supports the claim, but proof depends on chained validation, verifier-side inspection,
    negative fixtures, headless tests, or external evidence.
  requires_external: Cannot be proven by Credimi black-box pipeline alone.
support_vocabulary:
  supported_native: 'Can run with current/near-current Credimi primitives: StepCI, Maestro, Temporal, screenshots/videos and
    result aggregation.'
  credimi_upcoming: Should become a Credimi helper, adapter or profile validator.
  third_party: Requires external conformance suite, validation service, QTSP, CAB/lab, or manual review.
  manual_review: Requires human/CAB/compliance review.
core_runtime_objects:
  credential_offer:
    description: The concrete credential offer/deeplink consumed by the Wallet.
    temporal_role: Recorded as StepCI output and Maestro input.
    evidence_use: Binds the Wallet action to a concrete issuance session.
  credential_metadata:
    description: Normalized metadata extracted from credential offer and issuer .well-known metadata.
    temporal_role: Passed in conformance_context to the Maestro step, even if Maestro ignores it.
    evidence_use: Allows Credimi to infer which credential profile/format/grant/signing/trust properties were tested by the
      successful Wallet action.
    recommended_location: payload.conformance_context.credential_metadata
  presentation_metadata:
    description: Normalized metadata extracted from presentation request, RP cert/register data and verifier config.
    temporal_role: Passed in conformance_context to the Maestro presentation step.
    evidence_use: Allows Credimi to infer which RP/request/attribute/presentation profile was tested.
  trust_resolution_result:
    description: Output of trust-helper checks for lists, registers, certificates, revocation, status and entitlements.
    temporal_role: Recorded as trust-helper step output or conformance_context for downstream steps.
    evidence_use: Turns protocol/UX events into trust-resolved evidence.
