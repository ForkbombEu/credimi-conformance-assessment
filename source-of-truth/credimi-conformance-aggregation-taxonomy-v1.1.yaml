aggregated_test_templates:
- template_id: agg-issuance-positive-profile
  title: Positive issuance profile test
  actor_scope:
  - wallet
  - issuer
  - attestation_provider
  objective: Obtain a credential offer, resolve credential metadata, and prove that a real Wallet can complete issuance for
    that metadata profile.
  recommended_execution:
    primary_mode: stepci-metadata-plus-maestro
    credimi_support: supported_native
    outside_credimi_required: false
  pipeline_steps:
  - step_id: get-offer-a-for-metadata
    kind: stepci
    purpose: Fetch credential offer or equivalent issuer trigger used to derive metadata.
    outputs:
    - credential_offer_a
  - step_id: resolve-credential-metadata
    kind: metadata-helper
    purpose: Parse credential offer, fetch issuer .well-known, resolve credential configuration and produce credential_metadata.
    inputs:
    - credential_offer_a
    outputs:
    - credential_metadata
    - issuer_metadata_snapshot
    - issuer_metadata_hash
  - step_id: get-offer-b-for-wallet
    kind: stepci
    purpose: Fetch fresh credential offer for Wallet consumption if offers are single-use.
    outputs:
    - credential_offer_b
  - step_id: offer-consistency-check
    kind: metadata-helper
    purpose: Check Offer A/B equivalence by credential_id, issuer, configuration ID, grant type and issuer metadata hash.
    inputs:
    - credential_offer_a
    - credential_offer_b
    - credential_metadata
    outputs:
    - offer_consistency_result
  - step_id: wallet-get-credential
    kind: maestro
    purpose: Real Wallet consumes credential_offer_b and completes issuance.
    inputs:
    - credential_offer_b
    - conformance_context.credential_metadata
    outputs:
    - maestro_flow_output
    - screenshots
    - video
    - test_run_url
  input_requirements:
    required:
    - credential_id
    - credential_offer
    - issuer_metadata_snapshot
    - credential_metadata
    recommended_credential_metadata_fields:
    - credential_issuer
    - credential_configuration_ids
    - credential_profile
    - credential_format
    - grant_types
    - issuer_binding
    - signing_algorithms
    - key_strength
    - issuer_metadata_sha256
    - fetched_at
    - trust_mode
  emits_flat_tests:
  - test_no: 1
    when: credential_profile == PID
    strength: definitive
  - test_no: 2
    when: credential_profile == EAA
    strength: definitive
  - test_no: 3
    when: credential_profile in [QEAA,QEEA]
    strength: conditional
  - test_no: 4
    when: grant_type == authorization_code
    strength: definitive
  - test_no: 5
    when: grant_type == pre-authorized_code
    strength: definitive
  - test_no: 6
    when: credential_profile == PID and credential_format == SD_JWT
    strength: definitive
  - test_no: 7
    when: credential_profile == PID and credential_format == MDOC
    strength: definitive
  - test_no: 8
    when: credential_profile == EAA and credential_format == SD_JWT
    strength: definitive
  - test_no: 9
    when: credential_profile == EAA and credential_format == MDOC
    strength: definitive
  - test_no: 10
    when: signing_algorithm_family == RSA and key_strength == RSA_2048
    strength: definitive_for_issuance_completion
  - test_no: 11
    when: signing_algorithm in [ES256] or key_strength == P256
    strength: definitive_for_issuance_completion
  - test_no: 12
    when: signing_algorithm in [EdDSA] or key_strength == Ed25519
    strength: definitive_for_issuance_completion
  - test_no: 13
    when: issuer_binding in [x5c,x509]
    strength: definitive_for_issuance_completion
  - test_no: 14
    when: issuer_binding in [jwk,did]
    strength: definitive_for_issuance_completion
  - test_no: 15
    when: maestro asserts credential visible after issuance
    strength: definitive
  - test_no: 66
    when: issuer metadata fetched
    strength: definitive
  - test_no: 67
    when: metadata schema validation enabled
    strength: definitive
  - test_no: 68
    when: credential_profile == PID
    strength: definitive
  - test_no: 69
    when: credential_profile in [EAA,QEAA,QEEA,PUB_EAA]
    strength: definitive
  - test_no: 70
    when: credential_format == SD_JWT
    strength: definitive
  - test_no: 71
    when: credential_format == MDOC
    strength: definitive
  - test_no: 72
    when: signing_algorithms present in metadata
    strength: definitive
  - test_no: 73
    when: issuer_binding in [x5c,x509]
    strength: definitive
  - test_no: 74
    when: issuer_binding in [jwk,did]
    strength: definitive
  - test_no: 75
    when: credential offer syntax validated
    strength: definitive
  - test_no: 76
    when: offer issuer matches metadata issuer
    strength: definitive
  - test_no: 77
    when: offer configuration id exists in metadata
    strength: definitive
  - test_no: 78
    when: grant_type == authorization_code
    strength: definitive
  - test_no: 79
    when: grant_type == pre-authorized_code
    strength: definitive
  - test_no: 80
    when: two-offer pattern used
    strength: definitive
  - test_no: 81
    when: credential_profile == PID and Wallet issuance succeeds
    strength: definitive
  - test_no: 82
    when: credential_profile in [EAA,QEAA,QEEA] and Wallet issuance succeeds
    strength: definitive_for_interop
  - test_no: 83
    when: credential_profile in [QEAA,QEEA]
    strength: conditional
  - test_no: 102
    when: ETSI issuance profile helper enabled
    strength: conditional
  emits_evidence_claims:
  - wallet-receives-pid-eaa-issuance-request
  - wallet-completes-pid-eaa-issuance
  - pid-provider-issues-pid-to-wallet
  - eaa-provider-issues-eaa-to-wallet
  - eaa-pid-issuance-profile-validation
  coverage_rules:
  - rule_id: issuance-success-does-not-prove-wallet-crypto-rejection
    if: wallet-get-credential.result == pass
    then: Do not emit definitive evidence for Wallet signature verification. Emit conditional evidence only unless negative
      crypto fixtures or verifier-side inspection are also present.
  - rule_id: two-offer-consistency
    if: get-offer-a-for-metadata and get-offer-b-for-wallet are both present
    then: Require same credential_id, same credential_issuer, same credential_configuration_ids, same grant type and compatible
      issuer metadata hash.
  evidence_artifacts:
  - credential_offer_a
  - credential_offer_b
  - credential_metadata
  - issuer_metadata_snapshot
  - issuer_metadata_hash
  - offer_consistency_result
  - maestro_flow_output
  - screenshots
  - video
  - temporal_activity_inputs_outputs
  notes:
  - This is the highest-ROI aggregation pattern. It turns one simple issuance pipeline into many Wallet and Issuer evidence
    results.
  - The claim about RSA-2048/ES256/EdDSA is definitive only for successful completion under that advertised metadata profile,
    not for negative crypto-verification behaviour.
  normative_references:
  - reference_type: eu_legal_act
    id: EU-2024-2982
    document_name: Commission Implementing Regulation (EU) 2024/2982 — Protocols and interfaces
    url: https://eur-lex.europa.eu/eli/reg_impl/2024/2982/oj
    paragraph: Article 4
    notes: Issuance of PID and EAAs to wallet units.
  - reference_type: eu_legal_act
