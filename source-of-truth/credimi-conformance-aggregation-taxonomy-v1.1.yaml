    document_name: EUDI Architecture and Reference Framework — High-Level Requirements
    url: https://eudi.dev/latest/annexes/annex-2/annex-2.02-high-level-requirements-by-topic/#:~:text=ISSU_32
    paragraph: ISSU_32
