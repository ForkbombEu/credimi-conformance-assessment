- template_id: agg-issuance-persistence-and-presentation-chain
  title: Issuance plus later presentation/storage chain
  actor_scope:
  - wallet
  - verifier
  objective: Strengthen storage and internal-processing claims by issuing a credential, restarting/rebooting if desired, and
    later presenting the same credential to a verifier.
  recommended_execution:
    primary_mode: stepci-plus-maestro-plus-verifier
    credimi_support: supported_native
    outside_credimi_required: false
  pipeline_steps:
  - step_id: positive-issuance-profile
    kind: aggregate-ref
    ref: agg-issuance-positive-profile
  - step_id: optional-app-restart-or-device-reboot
    kind: maestro-or-adb
    purpose: Force state boundary before presentation.
    outputs:
    - restart_or_reboot_evidence
  - step_id: get-presentation-request
    kind: stepci
    purpose: Verifier creates presentation request for the issued credential type.
    outputs:
    - presentation_request
    - presentation_metadata
  - step_id: wallet-present-credential
    kind: maestro
    purpose: Wallet presents issued credential.
    inputs:
    - presentation_request
    - conformance_context.presentation_metadata
    outputs:
    - maestro_flow_output
    - screenshots
    - video
  - step_id: verifier-inspect-result
    kind: stepci-or-helper
    purpose: Verifier confirms the expected credential/claims were presented.
    outputs:
    - verifier_result
    - presented_claims
  input_requirements:
    required:
    - issued_credential_profile
    - presentation_request
    - verifier_result
  emits_flat_tests:
  - test_no: 16
    when: presentation succeeds after issuance
    strength: conditional_to_definitive_observable_storage
  - test_no: 17
    when: app restart included and presentation succeeds
    strength: definitive
  - test_no: 18
    when: device reboot included and presentation succeeds
    strength: definitive
  - test_no: 19
    when: presentation succeeds
    strength: conditional
  - test_no: 27
    when: presentation request opened by Wallet
    strength: definitive
  - test_no: 28
    when: OpenID4VP request processed
    strength: definitive
  - test_no: 31
    when: RP identity displayed/asserted
    strength: definitive
  - test_no: 32
    when: requested attributes displayed/asserted
    strength: definitive
  - test_no: 34
    when: approval gating checked
    strength: definitive
  - test_no: 36
    when: full disclosure approved and verifier confirms result
    strength: definitive
  - test_no: 39
    when: verifier inspects SD-JWT disclosures
    strength: definitive
  - test_no: 120
    when: verifier receives callback
    strength: definitive
  - test_no: 121
    when: presented credential is PID
    strength: definitive
  - test_no: 122
    when: presented credential is EAA/QEAA/QEEA
    strength: definitive
  - test_no: 123
    when: credential_format == SD_JWT and verifier inspects disclosures
    strength: definitive
  - test_no: 124
    when: credential_format == MDOC and verifier inspects presentation
    strength: definitive
  emits_evidence_claims:
  - wallet-completes-pid-eaa-issuance
  - wallet-processes-remote-presentation-request
  - wallet-displays-rp-identity-and-requested-attributes
  - wallet-user-approval-before-disclosure
  - wallet-selective-disclosure
  - verifier-generates-valid-presentation-request
  - verifier-validates-credential-signature-status-and-issuer-trust
  coverage_rules:
  - rule_id: storage-strengthening
    if: presentation succeeds after prior issuance
    then: Upgrade Wallet storage/retrieval evidence from conditional to definitive observable persistence, especially if app
      restart/reboot was included.
  - rule_id: verification-strengthening
    if: verifier inspected credential signature/claims
    then: Emit definitive verifier-side validation evidence; keep Wallet internal verification evidence conditional unless
      negative fixture test exists.
  evidence_artifacts:
  - presentation_request
  - presentation_metadata
  - verifier_callback
  - presented_claims
  - maestro_flow_output
  - screenshots
  - video
  notes: []
  normative_references:
  - reference_type: eu_legal_act
    id: EU-2024-2977
    document_name: Commission Implementing Regulation (EU) 2024/2977 — PID and electronic attestations of attributes
    url: https://eur-lex.europa.eu/eli/reg_impl/2024/2977/oj
    paragraph: Article 3(2)-(5)
    notes: PID contains authentication/validation information and is cryptographically bound to the wallet unit.
  - reference_type: eu_legal_act
    id: EU-2024-2977
    document_name: Commission Implementing Regulation (EU) 2024/2977 — PID and electronic attestations of attributes
    url: https://eur-lex.europa.eu/eli/reg_impl/2024/2977/oj
    paragraph: Article 4(1)-(3)
    notes: EAAs comply with supported standards and contain authentication/validation information.
  - reference_type: eu_legal_act
    id: EU-2024-2979
    document_name: Commission Implementing Regulation (EU) 2024/2979 — Wallet integrity and core functionalities
    url: https://eur-lex.europa.eu/eli/reg_impl/2024/2979/oj
    paragraph: Recital 6
    notes: Wallets securely request, obtain, select, combine, store, delete, share and present PID and EAAs under user control.
  - reference_type: arf_requirement
