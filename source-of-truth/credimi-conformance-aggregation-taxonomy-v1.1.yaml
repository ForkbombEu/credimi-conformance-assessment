# Added by the deterministic Go assessment generator. Existing taxonomy consumers can
# ignore these backward-compatible sections. The Go program extracts normalized facts;
# these declarative rules decide which flat conformance rows receive a result.
normalization_rules:
  credential_profile:
    PID:
      any:
        - field: credential.configuration_id
          contains: pid
        - field: credential.vct
          equals: urn:eudi:pid:1
        - field: credential.doctype
          equals: eu.europa.ec.eudi.pid.1
  credential_format:
    SD_JWT:
      any:
        - field: credential.raw_format
          equals: dc+sd-jwt
        - field: credential.raw_format
          equals: vc+sd-jwt
    MDOC:
      any:
        - field: credential.raw_format
          equals: mso_mdoc
  grant_type:
    authorization_code:
      field: credential_offer.grants.authorization_code
      exists: true
    pre-authorized_code:
      field: credential_offer.grants.pre-authorized_code
      exists: true
  signing_algorithm_family:
    ECDSA:
      any:
        - field: credential.signing_algorithms
          contains_any: [ES256, ES384, ES512, -7, -35, -36]
    EdDSA:
      any:
        - field: credential.signing_algorithms
          contains_any: [EdDSA, Ed25519]

assessment_rules:
  - rule_id: realtime-wallet-pid-offer
    test_id: 1
    result_text: "PASSED - PID credential offer was present in the real-time evidence and the Wallet issuance flow completed"
    strength: definitive
    when:
      all:
        - fact: credential_offer.exists
          equals: true
        - fact: credential_offer.is_pid
          equals: true
        - fact: wallet.issuance_flow_completed
          equals: true
