      reason: Only if issuer identification is used.
non_goals:
- Credimi evidence claims are not official requirement identifiers.
- Credimi does not act as a certification body unless separately accredited or mandated.
- Credimi does not directly introspect real Wallet internals.
- Credimi does not replace Member State or CAB legal conformity decisions.
status_vocabulary:
  supported_native: 'Executable with current Credimi primitives: StepCI, Maestro, Temporal, screenshots, videos, logs.'
  supported_third_party: Executable through integrated OpenID / WE BUILD / headless conformance tests.
  easy_helper_step: Small validator/checker/helper required, usually StepCI/Golang/YAML.
  requires_spec: Blocked mainly by missing/stabilizing ARF/WE BUILD/ETSI/certificate/list/profile details.
  requires_fixture: 'Needs positive/negative fixtures: certs, lists, WUAs, credentials, metadata, requests.'
  manual_review: Not fully black-box automatable; needs declaration, audit, CAB/human review.
  not_directly_observable: Real Wallet internals cannot be inspected; only inferred from behavior.
evidence_type_vocabulary:
  behavioral_black_box: Observed wallet/app behavior driven by Maestro.
  protocol_trace: HTTP/API/deeplink/callback/metadata evidence captured by StepCI.
  third_party_result: OpenID / WE BUILD / headless test result ingested by Credimi.
  trust_resolution: Result from list/certificate/revocation/entitlement helper.
  assurance_documentation: Report/certificate/log bundle intended for certification dependency analysis.
  manual_attestation: Declaration/audit evidence, not automatically proven by Credimi.
