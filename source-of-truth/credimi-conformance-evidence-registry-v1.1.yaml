  openid_and_iso_profiles:
  - id: OPENID-SIOPV2-DRAFT13
    name: Self-Issued OpenID Provider v2 — draft 13
    url: https://openid.net/specs/openid-connect-self-issued-v2-1_0.html
    type: openid_profile
    summary: Extends OpenID Connect with Self-Issued OpenID Providers controlled by the End-User. Covers SIOP discovery, RP
      registration, authorization requests/responses, Self-Issued ID Token validation, verifiable presentation support, and
      privacy/security considerations.
    relevance_for_eudi: Relevant to Wallet-as-OP and Wallet presentation/authentication models, especially SIOP invocation,
      RP metadata, cross-device flows, and Self-Issued ID Token validation.
  - id: ISO-IEC-DIS-18013-5-2020
    name: ISO/IEC DIS 18013-5:2020(E) — Mobile driving licence (mDL) application draft
    url: https://www.iso.org/standard/69084.html
    type: iso_standard_draft
    summary: Draft interface specification for mobile driving licence applications. Covers mDL data model, device engagement,
      data retrieval, session encryption, issuer data authentication, mDL authentication, mDL reader authentication, online
      retrieval, TLS/JWS and certificate profiles.
    relevance_for_eudi: Relevant to mdoc/mDL-based EUDI credentials and presentation/reader tests. The uploaded document is
      a draft and should be treated as implementation guidance unless replaced by the final licensed standard.
  - id: OPENID-FEDERATION-1.0
    name: OpenID Federation 1.0
    url: https://openid.net/specs/openid-federation-1_0.html
    type: openid_profile
    summary: Defines multilateral federation trust infrastructure for OpenID Connect/OAuth entities, including entity statements,
      trust chains, metadata policy, trust marks, federation endpoints, entity configuration, trust-chain resolution, key
      rollover and automatic registration.
    relevance_for_eudi: Relevant to EUDI trust-chain, RP/Issuer/Wallet federation metadata, automatic registration, trust
      marks, key rollover and resolver-based trust infrastructure.
